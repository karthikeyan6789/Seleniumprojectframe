name: Selenium Maven Pipeline

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Verify Maven
        run: mvn -version

      - name: Build Project
        run: mvn clean compile
        working-directory: eclipse-workspace/Seleniumpro

      - name: Run Tests
        run: mvn test
        working-directory: eclipse-workspace/Seleniumpro
